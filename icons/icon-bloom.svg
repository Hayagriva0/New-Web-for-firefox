<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bloom-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="50%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g transform="translate(60,60)">
    <!-- Ambient Base -->
    <circle cx="0" cy="0" r="50" fill="url(#bloom-bg)"/>
    
    <!-- Outer Arc Ribbons -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite"/>
      <path d="M-45,0 A45,45 0 0,1 45,0" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
      <path d="M-50,0 A50,50 0 0,0 50,0" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="8 8" opacity="0.4"/>
    </g>

    <!-- Layer 1: 6 Petals (Purple/Blue) -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.8; 1.25; 0.8" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" calcMode="spline" />
      <g transform="rotate(0)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
      <g transform="rotate(60)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
      <g transform="rotate(120)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
      <g transform="rotate(180)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
      <g transform="rotate(240)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
      <g transform="rotate(300)"><path d="M0,0 C25,-55 -25,-55 0,0" fill="url(#petal1)"/></g>
    </g>

    <!-- Layer 2: 6 Petals (Pink/Indigo) - Offset rotation and timing -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="1.25; 0.8; 1.25" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" calcMode="spline" />
      <g transform="rotate(30)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
      <g transform="rotate(90)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
      <g transform="rotate(150)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
      <g transform="rotate(210)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
      <g transform="rotate(270)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
      <g transform="rotate(330)"><path d="M0,0 C15,-48 -15,-48 0,0" fill="url(#petal2)"/></g>
    </g>

    <!-- Stamen Gear Rotation -->
    <path d="M0,-14 L2,-8 L8,-8 L4,-4 L6,2 L0,-2 L-6,2 L-4,-4 L-8,-8 L-2,-8 Z" fill="#fbbf24" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="6s" repeatCount="indefinite" />
    </path>

    <!-- Core -->
    <circle cx="0" cy="0" r="12" fill="url(#core-grad)" filter="url(#glow)">
      <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
