<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Deep blue to vibrant cyan gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Core dot — pulsing -->
    <circle cx="60" cy="60" r="14" fill="url(#g1)">
      <animate attributeName="r" values="14; 16; 14" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Inner orbital ring — fast spin -->
    <circle cx="60" cy="60" r="28" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-dasharray="40 20" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="8s" repeatCount="indefinite" />
    </circle>
    
    <!-- Middle orbital ring — reverse spin -->
    <circle cx="60" cy="60" r="42" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-dasharray="10 30" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="12s" repeatCount="indefinite" />
    </circle>
    
    <!-- Outer ring — slow spin -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.35">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
