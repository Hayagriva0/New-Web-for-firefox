<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="halo-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="40%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <conicGradient id="sweep" cx="50%" cy="50%" angle="0deg">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#a855f7" stop-opacity="0"/>
    </conicGradient>
    <!-- Pseudo-sweep with linear if conic isn't supported globally -->
    <linearGradient id="sweep-lin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <g transform="translate(60,60)">
    <!-- Base purple aura -->
    <circle cx="0" cy="0" r="48" fill="#7e22ce" opacity="0.15" filter="url(#glow)"/>

    <!-- Inner Core Hexagon (Geometric touch) -->
    <polygon points="0,-24 20.78,-12 20.78,12 0,24 -20.78,12 -20.78,-12" fill="url(#halo-center)" stroke="#d8b4fe" stroke-width="1.5">
       <animateTransform attributeName="transform" type="scale" values="1; 1.1; 1" dur="2s" repeatCount="indefinite"/>
    </polygon>

    <!-- Deep Inner Ring (Counter Rotating) -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#e9d5ff" stroke-width="2" stroke-dasharray="8 6" opacity="0.8" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Middle Track -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#4c1d95" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#e9d5ff" stroke-width="2" stroke-dasharray="6 30" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Outer Segmented Halo -->
    <circle cx="0" cy="0" r="46" fill="none" stroke="#581c87" stroke-width="6" stroke-dasharray="16 8"/>

    <!-- Sweeping Edge Light -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="2.5s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="46" fill="none" stroke="url(#sweep-lin)" stroke-width="6" stroke-dasharray="16 8"/>
      <!-- Bright leading edge -->
      <path d="M 0,-46 A 46,46 0 0,1 23,-39.8" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
</svg>
